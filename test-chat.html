<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Brainy Chat Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #app { background: white; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.12); width: 480px; display: flex; flex-direction: column; height: 600px; }
    h2 { padding: 16px 20px; border-bottom: 1px solid #eee; font-size: 16px; color: #333; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
    .user { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 4px; }
    .bot { align-self: flex-start; background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 4px; }
    .error { align-self: flex-start; background: #fee2e2; color: #991b1b; border-bottom-left-radius: 4px; }
    .msg img { display: block; max-width: 100%; border-radius: 10px; margin-top: 6px; }
    #form { display: flex; gap: 8px; padding: 14px; border-top: 1px solid #eee; align-items: center; }
    #input { flex: 1; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none; }
    #input:focus { border-color: #2563eb; }
    button { background: #2563eb; color: white; border: none; border-radius: 8px; padding: 10px 18px; font-size: 14px; cursor: pointer; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    #photoBtn { background: #f1f5f9; padding: 10px 12px; font-size: 18px; line-height: 1; }
    #session { font-size: 11px; color: #9ca3af; padding: 4px 20px 8px; }
    #preview { display: none; align-items: center; gap: 10px; padding: 8px 14px; border-top: 1px solid #eee; background: #f8fafc; }
    #preview img { width: 48px; height: 48px; object-fit: cover; border-radius: 8px; }
    #preview .name { flex: 1; font-size: 12px; color: #475569; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #preview .clear { background: #e2e8f0; color: #334155; padding: 6px 10px; font-size: 12px; }
  </style>
</head>
<body>
<div id="app">
  <h2>Brainy — Chat Test <span style="font-weight:normal;color:#6b7280;">(localhost:8080)</span></h2>
  <div id="messages"></div>
  <div id="session">session: —</div>
  <div id="preview">
    <img id="previewImg" alt="preview" />
    <span class="name" id="previewName"></span>
    <button type="button" class="clear" id="clearPhoto">✕</button>
  </div>
  <form id="form">
    <input id="photo" type="file" accept="image/*" hidden />
    <button type="button" id="photoBtn" title="Attach a photo">📷</button>
    <input id="input" type="text" placeholder="Type a message (or caption for a photo)..." autocomplete="off" />
    <button id="send">Send</button>
  </form>
</div>

<script>
  const CHAT_API = '/api/chat';
  const PHOTO_API = '/api/chat/photo';
  let sessionId = '';
  let pendingFile = null;

  const messages = document.getElementById('messages');
  const input = document.getElementById('input');
  const send = document.getElementById('send');
  const sessionLabel = document.getElementById('session');
  const photoInput = document.getElementById('photo');
  const photoBtn = document.getElementById('photoBtn');
  const preview = document.getElementById('preview');
  const previewImg = document.getElementById('previewImg');
  const previewName = document.getElementById('previewName');
  const clearPhoto = document.getElementById('clearPhoto');

  function addMsg(text, role, imageUrl) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    if (text) div.textContent = text;
    if (imageUrl) {
      const img = document.createElement('img');
      img.src = imageUrl;
      div.appendChild(img);
    }
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function setSession(id) {
    if (!id) return;
    sessionId = id;
    sessionLabel.textContent = 'session: ' + sessionId;
  }

  // ── Photo selection / preview ────────────────────────────────────────────
  photoBtn.addEventListener('click', () => photoInput.click());

  photoInput.addEventListener('change', () => {
    const file = photoInput.files[0];
    if (!file) return;
    pendingFile = file;
    previewImg.src = URL.createObjectURL(file);
    previewName.textContent = file.name + ' (' + Math.round(file.size / 1024) + ' KB)';
    preview.style.display = 'flex';
    input.focus();
  });

  function resetPhoto() {
    pendingFile = null;
    photoInput.value = '';
    if (previewImg.src.startsWith('blob:')) URL.revokeObjectURL(previewImg.src);
    preview.style.display = 'none';
  }
  clearPhoto.addEventListener('click', resetPhoto);

  // ── Send (text OR photo) ──────────────────────────────────────────────────
  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim();

    if (pendingFile) {
      await sendPhoto(text, pendingFile);
      return;
    }
    if (!text) return;
    await sendText(text);
  });

  async function sendText(msg) {
    input.value = '';
    send.disabled = true;
    addMsg(msg, 'user');
    try {
      const res = await fetch(CHAT_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, session_id: sessionId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || res.statusText);
      setSession(data.session_id);
      addMsg(data.reply, 'bot');
    } catch (err) {
      addMsg('Error: ' + err.message, 'error');
    } finally {
      send.disabled = false;
      input.focus();
    }
  }

  async function sendPhoto(caption, file) {
    const localUrl = URL.createObjectURL(file);
    input.value = '';
    send.disabled = true;
    addMsg(caption, 'user', localUrl);
    resetPhoto();

    const form = new FormData();
    form.append('image', file);
    if (caption) form.append('caption', caption);
    if (sessionId) form.append('session_id', sessionId);

    addMsg('Analysing photo…', 'bot');
    const pending = messages.lastChild;
    try {
      const res = await fetch(PHOTO_API, { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || res.statusText);
      setSession(data.session_id);
      pending.textContent = data.reply;
    } catch (err) {
      pending.className = 'msg error';
      pending.textContent = 'Error: ' + err.message;
    } finally {
      send.disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
