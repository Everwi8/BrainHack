<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Brainy Chat Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #app { background: white; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.12); width: 480px; display: flex; flex-direction: column; height: 600px; }
    h2 { padding: 16px 20px; border-bottom: 1px solid #eee; font-size: 16px; color: #333; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
    .user { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 4px; }
    .bot { align-self: flex-start; background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 4px; }
    .error { align-self: flex-start; background: #fee2e2; color: #991b1b; border-bottom-left-radius: 4px; }
    #form { display: flex; gap: 8px; padding: 14px; border-top: 1px solid #eee; }
    #input { flex: 1; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none; }
    #input:focus { border-color: #2563eb; }
    button { background: #2563eb; color: white; border: none; border-radius: 8px; padding: 10px 18px; font-size: 14px; cursor: pointer; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    #session { font-size: 11px; color: #9ca3af; padding: 4px 20px 8px; }
  </style>
</head>
<body>
<div id="app">
  <h2>Brainy — Chat Test <span style="font-weight:normal;color:#6b7280;">(localhost:8080)</span></h2>
  <div id="messages"></div>
  <div id="session">session: —</div>
  <form id="form">
    <input id="input" type="text" placeholder="Type a message..." autocomplete="off" />
    <button id="send">Send</button>
  </form>
</div>

<script>
  const API = '/api/chat';
  let sessionId = '';

  const messages = document.getElementById('messages');
  const input = document.getElementById('input');
  const send = document.getElementById('send');
  const sessionLabel = document.getElementById('session');

  function addMsg(text, role) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = input.value.trim();
    if (!msg) return;

    input.value = '';
    send.disabled = true;
    addMsg(msg, 'user');

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, session_id: sessionId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || res.statusText);
      sessionId = data.session_id;
      sessionLabel.textContent = 'session: ' + sessionId;
      addMsg(data.reply, 'bot');
    } catch (err) {
      addMsg('Error: ' + err.message, 'error');
    } finally {
      send.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>
